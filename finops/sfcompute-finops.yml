meters:
- name: gpu_hours
  description: GPU-hours consumed against filled buy orders, priced per block at the market-clearing rate.
  unit: gpu_hours
  aggregation: sum
  dimensions:
  - account
  - instance_type
  - contract
- name: block_price_cents
  description: Total clearing price in cents for a purchased block of compute.
  unit: cents
  aggregation: sum
  dimensions:
  - account
  - order
  - instance_type
- name: resale_credit_cents
  description: Credit in cents from reselling unused contract time back to the market.
  unit: cents
  aggregation: sum
  dimensions:
  - account
  - contract
- name: inference_gpu_hours
  description: GPU-hours backing the OpenAI-compatible inference fleet.
  unit: gpu_hours
  aggregation: sum
  dimensions:
  - account
  - model
- name: balance_cents
  description: Available and current account balance in cents.
  unit: cents
  aggregation: last
  dimensions:
  - account
principles:
- name: Visibility
  description: Pull /v0/balance and /v0/transactions; inspect GPU-hours and per-block clearing prices.
- name: Allocation
  description: Tag API tokens and contracts per team/workload; map clusters to internal cost centers.
- name: Optimization
  description: Buy at off-peak market prices, right-size duration and node count, and resell unused contract time to recover spend.
- name: Accountability
  description: Assign owners per contract/token; review market spend and resale credits against budget.
maintainers:
