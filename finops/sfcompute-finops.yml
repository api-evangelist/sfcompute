description: >-
  FinOps view of SF Compute spend. SF Compute is a spot-priced GPU market: cost
  is the market-clearing price per block of GPU-hours rather than a fixed
  per-GPU-hour rate. Buyers place priced buy orders that resolve into contracts;
  unused contract time can be resold, creating an offsetting credit. Spend is
  driven by GPU-hours consumed across instance types (h100i, h100v, h200ki),
  the per-block clearing price, and any inference-fleet capacity. Balances and
  transactions are exposed in cents via the API for reconciliation.
notes: >-
  Per-block prices float with the market and are not reconciled here; pull
  /v0/balance and /v0/transactions for actuals and use /v0/quote for forward
  cost estimates. reconciled=false because rates are market-driven.
sources:
- https://sfcompute.com/prices
- https://docs.sfcompute.com/docs/how-the-market-works
